name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Resolve version
        id: version
        shell: powershell
        run: |
          $version = if ($env:GITHUB_REF_TYPE -eq 'tag') {
            $env:GITHUB_REF_NAME -replace '^v', ''
          } else {
            '0.0.0-ci'
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build installer
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: .\scripts\Build.ps1 -Version '${{ steps.version.outputs.version }}'

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: BD-AUTO-Setup
          path: |
            dist/BD-AUTO-Setup.exe
            dist/BD-AUTO-Setup.exe.sha256

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $releasesJson = gh release list --repo $env:GITHUB_REPOSITORY --limit 100 --json tagName
          if ($LASTEXITCODE -ne 0) {
            throw 'Unable to query existing GitHub releases.'
          }

          $releaseExists = @($releasesJson | ConvertFrom-Json | Where-Object { $_.tagName -eq $env:GITHUB_REF_NAME }).Count -gt 0
          if ($releaseExists) {
            Write-Host "GitHub release $env:GITHUB_REF_NAME already exists. Skipping release creation to preserve the published asset set."
            exit 0
          }

          gh release create $env:GITHUB_REF_NAME `
            "dist/BD-AUTO-Setup.exe#BD-AUTO Setup" `
            "dist/BD-AUTO-Setup.exe.sha256#Optional checksum for advanced users" `
            --title "BD-AUTO $env:GITHUB_REF_NAME" `
            --notes "Download `BD-AUTO-Setup.exe` if you want to install BD-AUTO. The checksum file is optional and is only for people who want to verify the installer manually. See [THIRD-PARTY-NOTICES.md](https://github.com/Drakcain/BD-AUTO/blob/$env:GITHUB_REF_NAME/THIRD-PARTY-NOTICES.md) for attribution, upstream licenses, and third-party project credits." `
            --generate-notes
