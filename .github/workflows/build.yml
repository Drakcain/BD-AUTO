name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Resolve version
        id: version
        shell: powershell
        run: |
          $version = if ($env:GITHUB_REF_TYPE -eq 'tag') {
            $env:GITHUB_REF_NAME -replace '^v', ''
          } else {
            '0.0.0-ci'
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build installer
        shell: powershell
        run: .\scripts\Build.ps1 -Version '${{ steps.version.outputs.version }}'

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: BD-AUTO-Setup
          path: |
            dist/BD-AUTO-Setup.exe
            dist/BD-AUTO-Setup.exe.sha256

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $env:GITHUB_REF_NAME `
            "dist/BD-AUTO-Setup.exe#BD-AUTO Setup" `
            "dist/BD-AUTO-Setup.exe.sha256#SHA-256 checksum" `
            --title "BD-AUTO $env:GITHUB_REF_NAME" `
            --generate-notes
